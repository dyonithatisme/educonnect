<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:#fff;font-family:var(--wds-font-sans);display:flex;align-items:center;gap:36px;justify-content:center}
  .symbol{width:110px;height:auto}
  .stack{display:flex;flex-direction:column;gap:14px}
  .wordmark{height:28px}
  .row{display:flex;align-items:center;gap:12px}
  .lbl{font:600 11px/1 var(--wds-font-sans);letter-spacing:.04em;color:var(--wds-fg-neutral-assistive);text-transform:uppercase;min-width:50px}
</style></head><body>
  <img class="symbol" src="../assets/logos/wanted-symbol.png" alt="Wanted symbol">
  <div class="stack">
    <div class="row"><span class="lbl">Wanted</span><img class="wordmark" src="../assets/logos/wanted-logotype.svg" alt="Wanted"></div>
    <div class="row"><span class="lbl">Space</span><img class="wordmark" src="../assets/logos/space-logotype.svg" alt="Space"></div>
    <div class="row"><span class="lbl">Gigs</span><img class="wordmark" src="../assets/logos/gigs-logotype.svg" alt="Gigs"></div>
    <div class="row"><span class="lbl">Agent</span><img class="wordmark" src="../assets/logos/agent-logotype.svg" alt="Agent"></div>
  </div>
</body></html>
