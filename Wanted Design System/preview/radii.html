<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--wds-font-sans)}
  .row{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
  .it{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:64px;height:64px;background:var(--wds-cool-95);box-shadow:inset 0 0 0 1px rgba(112,115,124,.22)}
  .lbl{font:600 11px/1 var(--wds-font-mono);color:var(--wds-fg-neutral-secondary)}
</style></head><body>
  <div class="row">
    <div class="it"><div class="box" style="border-radius:0"></div><div class="lbl">0</div></div>
    <div class="it"><div class="box" style="border-radius:4px"></div><div class="lbl">4</div></div>
    <div class="it"><div class="box" style="border-radius:6px"></div><div class="lbl">6</div></div>
    <div class="it"><div class="box" style="border-radius:8px"></div><div class="lbl">8</div></div>
    <div class="it"><div class="box" style="border-radius:10px"></div><div class="lbl">10</div></div>
    <div class="it"><div class="box" style="border-radius:12px"></div><div class="lbl">12</div></div>
    <div class="it"><div class="box" style="border-radius:16px"></div><div class="lbl">16</div></div>
    <div class="it"><div class="box" style="border-radius:24px"></div><div class="lbl">24</div></div>
    <div class="it"><div class="box" style="border-radius:32px"></div><div class="lbl">32</div></div>
    <div class="it"><div class="box" style="border-radius:9999px"></div><div class="lbl">full</div></div>
  </div>
</body></html>
