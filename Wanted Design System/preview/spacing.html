<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:#fff;font-family:var(--wds-font-sans)}
  .wrap{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--wds-blue-40);border-radius:3px;height:14px}
  .lbl{font:600 11px/1 var(--wds-font-mono);color:var(--wds-fg-neutral-secondary)}
</style></head><body>
  <div class="wrap">
    <div class="item"><div class="bar" style="width:4px"></div><div class="lbl">4</div></div>
    <div class="item"><div class="bar" style="width:8px"></div><div class="lbl">8</div></div>
    <div class="item"><div class="bar" style="width:12px"></div><div class="lbl">12</div></div>
    <div class="item"><div class="bar" style="width:16px"></div><div class="lbl">16</div></div>
    <div class="item"><div class="bar" style="width:24px"></div><div class="lbl">24</div></div>
    <div class="item"><div class="bar" style="width:32px"></div><div class="lbl">32</div></div>
    <div class="item"><div class="bar" style="width:48px"></div><div class="lbl">48</div></div>
    <div class="item"><div class="bar" style="width:64px"></div><div class="lbl">64</div></div>
    <div class="item"><div class="bar" style="width:96px"></div><div class="lbl">96</div></div>
    <div class="item"><div class="bar" style="width:128px"></div><div class="lbl">128</div></div>
  </div>
</body></html>
