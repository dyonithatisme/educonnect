<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .sw{width:72px;height:72px;border-radius:12px;position:relative;box-shadow:inset 0 0 0 1px rgba(112,115,124,.14)}
  .sw .lbl{position:absolute;bottom:6px;left:8px;font:600 11px/1 var(--wds-font-sans);color:rgba(255,255,255,.9);letter-spacing:.02em}
  .sw .lbl.dark{color:rgba(0,0,0,.72)}
  .title{font:700 13px/1 var(--wds-font-sans);letter-spacing:.03em;color:var(--wds-fg-neutral-assistive);text-transform:uppercase;margin:0 0 12px}
</style></head><body>
<p class="title">Cool Neutral · dominant UI gray</p>
<div class="row">
  <div class="sw" style="background:var(--wds-cool-99)"><span class="lbl dark">99</span></div>
  <div class="sw" style="background:var(--wds-cool-97)"><span class="lbl dark">97</span></div>
  <div class="sw" style="background:var(--wds-cool-95)"><span class="lbl dark">95</span></div>
  <div class="sw" style="background:var(--wds-cool-90)"><span class="lbl dark">90</span></div>
  <div class="sw" style="background:var(--wds-cool-80)"><span class="lbl dark">80</span></div>
  <div class="sw" style="background:var(--wds-cool-70)"><span class="lbl">70</span></div>
  <div class="sw" style="background:var(--wds-cool-50)"><span class="lbl">50</span></div>
  <div class="sw" style="background:var(--wds-cool-30)"><span class="lbl">30</span></div>
  <div class="sw" style="background:var(--wds-cool-20)"><span class="lbl">20</span></div>
  <div class="sw" style="background:var(--wds-cool-10)"><span class="lbl">10</span></div>
  <div class="sw" style="background:var(--wds-cool-5)"><span class="lbl">5</span></div>
</div>
</body></html>
