<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--wds-font-sans)}
  .wrap{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9999px;font:600 13px/1 var(--wds-font-sans);letter-spacing:.019em}
  .c-blue{background:#eaf2fe;color:#0066ff}
  .c-green{background:#e6f9ed;color:#00a538}
  .c-red{background:#ffecec;color:#ff4242}
  .c-neutral{background:#f1f2f4;color:#484a4f}
  .c-violet{background:#f0ecfe;color:#6541f2}
  .c-outline{background:#fff;color:#17181a;box-shadow:inset 0 0 0 1px rgba(112,115,124,.28)}
  .dot{width:6px;height:6px;border-radius:9999px;background:currentColor}
  .badge{min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#ff4242;color:#fff;font:700 11px/1 var(--wds-font-sans);display:inline-flex;align-items:center;justify-content:center;letter-spacing:0}
</style></head><body>
  <div class="wrap">
    <span class="chip c-blue">신규</span>
    <span class="chip c-green"><span class="dot"></span>합격</span>
    <span class="chip c-red">마감임박</span>
    <span class="chip c-neutral">경력 3–5년</span>
    <span class="chip c-violet">원티드 추천</span>
    <span class="chip c-outline">서울</span>
    <span class="badge">3</span>
    <span class="badge" style="min-width:24px;padding:0 7px">99+</span>
  </div>
</body></html>
