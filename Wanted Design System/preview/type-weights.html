<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:#fff;font-family:var(--wds-font-sans)}
  .row{display:flex;align-items:baseline;gap:24px;padding:4px 0}
  .num{font:500 11px/1 var(--wds-font-mono);color:var(--wds-fg-neutral-assistive);width:56px;letter-spacing:.06em}
  .name{font:500 12px/1 var(--wds-font-sans);color:var(--wds-fg-neutral-assistive);width:110px;letter-spacing:.02em}
  .sp{font-size:28px;line-height:1;letter-spacing:-.02em;color:var(--wds-fg-neutral-primary)}
</style></head><body>
  <div class="row"><span class="num">100</span><span class="name">Thin</span><span class="sp" style="font-weight:100">커리어 Aa 100</span></div>
  <div class="row"><span class="num">300</span><span class="name">Light</span><span class="sp" style="font-weight:300">커리어 Aa 300</span></div>
  <div class="row"><span class="num">400</span><span class="name">Regular</span><span class="sp" style="font-weight:400">커리어 Aa 400</span></div>
  <div class="row"><span class="num">500</span><span class="name">Medium</span><span class="sp" style="font-weight:500">커리어 Aa 500</span></div>
  <div class="row"><span class="num">600</span><span class="name">SemiBold</span><span class="sp" style="font-weight:600">커리어 Aa 600</span></div>
  <div class="row"><span class="num">700</span><span class="name">Bold</span><span class="sp" style="font-weight:700">커리어 Aa 700</span></div>
  <div class="row"><span class="num">800</span><span class="name">ExtraBold</span><span class="sp" style="font-weight:800">커리어 Aa 800</span></div>
  <div class="row"><span class="num">900</span><span class="name">Black</span><span class="sp" style="font-weight:900">커리어 Aa 900</span></div>
</body></html>
