<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .tile{border-radius:10px;padding:14px;min-height:78px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:inset 0 0 0 1px rgba(112,115,124,.14)}
  .tile .k{font:700 11px/1 var(--wds-font-sans);letter-spacing:.04em;text-transform:uppercase;opacity:.7}
  .tile .v{font:600 14px/1.2 var(--wds-font-sans)}
</style></head><body>
<div class="grid">
  <div class="tile" style="background:#e6f9ed;color:#004815"><span class="k">Positive</span><span class="v">Green 60 · #00BF40</span></div>
  <div class="tile" style="background:#ffecec;color:#820909"><span class="k">Negative</span><span class="v">Red 50 · #FF4242</span></div>
  <div class="tile" style="background:#fff3e6;color:#7a2c00"><span class="k">Caution</span><span class="v">Orange 40 · #E25D00</span></div>
  <div class="tile" style="background:#eaf2fe;color:#00307d"><span class="k">Informative</span><span class="v">Blue 40 · #0066FF</span></div>
  <div class="tile" style="background:#f0ecfe;color:#2d1b7a"><span class="k">Accent Violet</span><span class="v">#9747FF · #F0ECFE</span></div>
  <div class="tile" style="background:#fff;color:#17181a;box-shadow:inset 0 0 0 1px rgba(112,115,124,.22)"><span class="k">Surface</span><span class="v">BG · #FFFFFF</span></div>
  <div class="tile" style="background:#f7f7f8;color:#17181a"><span class="k">Surface Subtle</span><span class="v">Cool 97 · #F7F7F8</span></div>
  <div class="tile" style="background:#17181a;color:#fff"><span class="k">FG Primary</span><span class="v">Neutral 10 · #17181A</span></div>
</div>
</body></html>
