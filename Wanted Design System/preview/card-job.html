<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--wds-cool-97);font-family:var(--wds-font-sans)}
  .card{background:#fff;border-radius:16px;box-shadow:0 1px 4px 0 rgba(23,23,23,.06),0 2px 8px 0 rgba(23,23,23,.07);padding:20px;width:340px}
  .logo{width:44px;height:44px;border-radius:10px;background:var(--wds-cool-95);display:flex;align-items:center;justify-content:center;font:700 16px var(--wds-font-sans);color:var(--wds-fg-neutral-secondary)}
  .row{display:flex;gap:12px;align-items:center}
  .company{font:600 12px/1 var(--wds-font-sans);color:var(--wds-fg-neutral-assistive);letter-spacing:.019em;margin:14px 0 4px}
  .title{font:700 17px/1.412 var(--wds-font-sans);color:var(--wds-fg-neutral-primary);letter-spacing:0;margin:0 0 12px}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .chip{display:inline-flex;padding:4px 10px;border-radius:9999px;background:var(--wds-cool-95);font:600 12px/1.334 var(--wds-font-sans);color:var(--wds-fg-neutral-secondary)}
  .foot{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid rgba(112,115,124,.14)}
  .rew{font:700 14px/1 var(--wds-font-sans);color:#0066ff}
  .bm{width:32px;height:32px;border-radius:8px;background:var(--wds-cool-95);display:flex;align-items:center;justify-content:center}
</style></head><body>
  <div class="card">
    <div class="row">
      <div class="logo">W</div>
      <div><div class="company">원티드랩 · 서울</div></div>
    </div>
    <div class="company" style="margin:16px 0 0">WANTED LAB</div>
    <h3 class="title">Senior Product Designer, Design System</h3>
    <div class="meta">
      <span class="chip">경력 5–8년</span>
      <span class="chip">정규직</span>
      <span class="chip">강남구</span>
    </div>
    <div class="foot">
      <span class="rew">채용보상금 500만원</span>
      <div class="bm">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>
    </div>
  </div>
</body></html>
