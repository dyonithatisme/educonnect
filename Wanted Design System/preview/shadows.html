<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--wds-cool-97);font-family:var(--wds-font-sans)}
  .row{display:flex;gap:32px;align-items:center}
  .s{width:130px;height:88px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;font:600 12px/1 var(--wds-font-mono);color:var(--wds-fg-neutral-secondary)}
  .em{box-shadow:var(--wds-shadow-emphasize)}
  .no{box-shadow:var(--wds-shadow-normal)}
  .st{box-shadow:var(--wds-shadow-strong)}
</style></head><body>
  <div class="row">
    <div class="s em">Emphasize</div>
    <div class="s no">Normal</div>
    <div class="s st">Strong</div>
  </div>
</body></html>
